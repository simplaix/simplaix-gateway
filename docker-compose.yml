services:
  postgres:
    image: postgres:17-alpine
    container_name: simplaix-gateway-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway}
      POSTGRES_DB: ${POSTGRES_DB:-gateway}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gateway}"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: .
    container_name: simplaix-gateway
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-gateway}:${POSTGRES_PASSWORD:-gateway}@postgres:5432/${POSTGRES_DB:-gateway}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_ISSUER: ${JWT_ISSUER:-simplaix-gateway}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-simplaix-gateway}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_EXTERNAL_ISSUERS: ${JWT_EXTERNAL_ISSUERS:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://gateway:3001}

volumes:
  pgdata:
