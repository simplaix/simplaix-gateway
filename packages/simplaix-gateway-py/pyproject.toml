[project]
name = "simplaix-gateway"
version = "0.1.0"
description = "Python SDK for Simplaix Gateway — MCP proxy auth and credential management"
authors = [{ name = "Simplaix" }]
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "mcp>=1.0.0",
    "pydantic-settings>=2.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["simplaix_gateway"]
